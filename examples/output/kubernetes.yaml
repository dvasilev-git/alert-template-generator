groups:
- name: kubernetes.rules
  rules:
  - alert: CPU Close to Limits
    expr: |-
      (sum by (namespace,pod,container,cluster)(
        rate(container_cpu_usage_seconds_total{container!=""}[5m])
      ) / sum by(namespace,pod,container,cluster)(
        kube_pod_container_resource_limits{resource="cpu"}
      )) * 100 > 95
    labels:
      team: infrastructure
      severity: critical
      severity_order: '1'
    annotations:
      summary: Pod CPU usage approaching resource limits
      runbook: /docs/runbooks/cpu-limits.md
    for: 5m
  - alert: CPU Close to Limits
    expr: |-
      (sum by (namespace,pod,container,cluster)(
        rate(container_cpu_usage_seconds_total{container!=""}[5m])
      ) / sum by(namespace,pod,container,cluster)(
        kube_pod_container_resource_limits{resource="cpu"}
      )) * 100 > 90
    labels:
      team: infrastructure
      severity: warning
      severity_order: '2'
    annotations:
      summary: Pod CPU usage approaching resource limits
      runbook: /docs/runbooks/cpu-limits.md
    for: 5m
  - alert: Memory Close to Limits
    expr: |-
      (sum by (namespace,pod,container,cluster)(
        container_memory_working_set_bytes{container!=""}
      ) / sum by(namespace,pod,container,cluster)(
        kube_pod_container_resource_limits{resource="memory"}
      )) * 100 > 95
    labels:
      team: infrastructure
      severity: critical
      severity_order: '1'
    annotations:
      summary: Pod memory usage approaching resource limits
      runbook: /docs/runbooks/memory-limits.md
    for: 5m
  - alert: Memory Close to Limits
    expr: |-
      (sum by (namespace,pod,container,cluster)(
        container_memory_working_set_bytes{container!=""}
      ) / sum by(namespace,pod,container,cluster)(
        kube_pod_container_resource_limits{resource="memory"}
      )) * 100 > 90
    labels:
      team: infrastructure
      severity: warning
      severity_order: '2'
    annotations:
      summary: Pod memory usage approaching resource limits
      runbook: /docs/runbooks/memory-limits.md
    for: 5m
  - alert: Pod Restart Loop
    expr: increase(kube_pod_container_status_restarts_total[1h]) > 10
    labels:
      team: infrastructure
      severity: critical
      severity_order: '1'
    annotations:
      summary: Pod restarting frequently
    for: 5m
  - alert: Pod Restart Loop
    expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
    labels:
      team: infrastructure
      severity: warning
      severity_order: '2'
    annotations:
      summary: Pod restarting frequently
    for: 10m
