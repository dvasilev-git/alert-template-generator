groups:
  - name: database.rules
    rules:
      - name: Database Connection Pool Exhaustion
        annotations:
          summary: "Database connection pool running low"
          runbook: /docs/runbooks/db-connections.md
        labels:
          team: backend
        severities:
          - level: critical
            expr: |
              (pg_stat_activity_count / pg_settings_max_connections) * 100 > 90
            for: 5m
          - level: warning
            expr: |
              (pg_stat_activity_count / pg_settings_max_connections) * 100 > 75
            for: 10m

      - name: Database Replication Lag
        annotations:
          summary: "Database replication falling behind"
        labels:
          team: backend
        severities:
          - level: critical
            expr: |
              pg_replication_lag_seconds > 30
            for: 5m
          - level: warning
            expr: |
              pg_replication_lag_seconds > 10
            for: 5m
          - level: low
            expr: |
              pg_replication_lag_seconds > 5
            for: 10m
